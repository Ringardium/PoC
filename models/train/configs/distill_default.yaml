# Knowledge distillation configuration
# Usage: python -m train distill --config train/configs/distill_default.yaml \
#            --teacher weights/modelv11x.pt --student yolo11n.pt --data data.yaml

epochs: 100
imgsz: 640
batch: 16
device: auto
workers: 8
patience: 50
optimizer: auto
iou: 0.7              # NMS IoU threshold (validation)
conf: 0.001           # Confidence threshold (validation, 낮을수록 recall 평가 정확)

# Distillation parameters
temperature: 4.0          # Higher = softer probability distribution (try 2.0-10.0)
alpha: 0.5                # 0.0 = task loss only, 1.0 = distill loss only
distill_features: true    # Enable intermediate feature distillation
feature_layers: []        # Empty = auto-detect (layers feeding into Detect head)

# Learning rate
lr0: 0.01
lrf: 0.01
warmup_epochs: 3.0

# Loss weights (applied to task loss component)
loss:
  box: 7.5
  cls: 1.3
  dfl: 1.5

# Minimal augmentation for clean distillation signal
augment:
  mosaic: 1.0
  copy_paste: 0.0
  mixup: 0.0
  erasing: 0.0
  scale: 0.5
  degrees: 0.0
  translate: 0.1
  perspective: 0.0
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  fliplr: 0.5
  flipud: 0.0
  close_mosaic: 10
