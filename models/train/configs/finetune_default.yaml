# Fine-tuning configuration (same-class refinement)
# Usage: python -m train finetune --config train/configs/finetune_default.yaml --data data.yaml

model: weights/modelv11x.pt
epochs: 100
imgsz: 640
batch: 16
device: auto
workers: 8
patience: 50
optimizer: auto
iou: 0.7              # NMS IoU threshold (validation)
conf: 0.001           # Confidence threshold (validation)

# Learning rate
lr0: 0.01
lrf: 0.01
warmup_epochs: 3.0

# Freeze (0 = no freezing)
freeze_layers: 0

# Loss weights
loss:
  box: 7.5    # Box regression loss gain
  cls: 1.25    # Classification loss gain
  dfl: 1.5    # Distribution focal loss gain

# Augmentation
augment:
  mosaic: 1.0
  copy_paste: 0.3
  mixup: 0.15
  erasing: 0.4
  scale: 0.9
  degrees: 10.0
  translate: 0.2
  perspective: 0.0005
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  fliplr: 0.5
  flipud: 0.0
  close_mosaic: 10
